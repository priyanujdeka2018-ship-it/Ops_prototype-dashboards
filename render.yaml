services:
  # Primary URL serves the Aurora React front-end (static, no build step).
  # frontend/data/data.json is pre-computed from the CSVs by
  # `python -m src.build_frontend_data` and committed.
  # The Streamlit app (Modules A-D drilldowns) remains runnable locally:
  #   streamlit run app.py
  - type: web
    name: scale-regional-ops-command-center
    env: python
    plan: free
    buildCommand: ""
    startCommand: python -m http.server $PORT -d frontend
