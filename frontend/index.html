<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scale · Regional Ops Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100vh; background: #0A0A12; font-family: "Geist", system-ui, sans-serif; color: #F5F5F0; }
    #root { min-height: 100vh; }
    button { font-family: inherit; }
    body { overflow-x: hidden; }
    .ops-footer {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      background: rgba(10,10,15,0.75);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 8px 18px;
      font-family: "Geist Mono", ui-monospace, monospace;
      font-size: 11px;
      color: #94A3B8;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
    }
    .ops-footer .pulse {
      width: 6px; height: 6px; border-radius: 50%;
      background: #5EEAD4; box-shadow: 0 0 8px #5EEAD4;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .ops-footer a { color: #5EEAD4; text-decoration: none; border-bottom: 1px dotted rgba(94,234,212,0.4); }
    .ops-footer a:hover { color: #fff; }
  </style>
</head>
<body>
  <div id="root"></div>

  <div class="ops-footer">
    <span class="pulse"></span>
    <span>Interview prototype for Scale AI · Regional Ops lead</span>
    <span style="opacity:0.4">·</span>
    <span>Module A + B operating view · <a href="#about">about</a></span>
  </div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- App scripts -->
  <script type="text/babel" src="src/data-utils.jsx"></script>
  <script type="text/babel" src="src/dashboard-aurora.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
